name: Update Profile README

on:
  schedule:
    # Runs every day at 00:30 UTC
    - cron: '30 0 * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  update-readme:
    name: Update Profile Card SVGs
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dateutil lxml

      - name: Run today.py
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: trust-lionel
        run: python today.py

      - name: Commit and push updated SVGs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dark_mode.svg light_mode.svg cache/
          git diff --staged --quiet || git commit -m "chore: auto-update profile card [$(date -u +'%Y-%m-%d')]"
          git push
