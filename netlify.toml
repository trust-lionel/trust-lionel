# =============================================================
# netlify.toml — trust-lionel.com
# Lionel Mosley | ahr-ki-tekt Design Journal
# Litos theme / Astro static site deployment on Netlify
# =============================================================
# Version history:
#   v1.0  Initial Astro/Netlify configuration
#   v1.1  Added security headers and CSP
#   v1.2  Added HSTS and cache control rules
#   v1.3  Added www-to-apex and HTTP-to-HTTPS redirects
#   v1.4  Added Jekyll/SquareSpace /blog/ → /posts/ redirects
#         (July 3, 2026)
#   v1.5  Added Google Search Console HTTP header verification
#         and sitemap cache rules (July 3, 2026)
#   v1.6  Removed GSC HTTP header verification — existing DNS
#         verification is active and sufficient. Added
#         plus.unsplash.com to CSP img-src for Unsplash+
#         cover images (July 3, 2026)
#   v1.7  Added Spotify embed support to CSP — frame-src,
#         connect-src, and img-src updated to allow
#         open.spotify.com and i.scdn.co (album art CDN)
#         (July 3, 2026)
# =============================================================

# ── BUILD SETTINGS ───────────────────────────────────────────
[build]
  # pnpm is the package manager Litos uses by default
  command         = "pnpm run build && pnpm pagefind --site dist"
  publish         = "dist"

  [build.environment]
    # Node.js 22 — required by Astro v7
    NODE_VERSION  = "22"
    # Tell Netlify to use pnpm instead of npm
    NPM_FLAGS     = "--version"  # suppresses npm fallback warning

# ── PNPM SUPPORT ─────────────────────────────────────────────
# Netlify detects pnpm from the lockfile (pnpm-lock.yaml)
# and installs it automatically. No additional config needed.

# ── REDIRECTS ────────────────────────────────────────────────

# Force HTTPS — redirect all HTTP traffic to HTTPS
[[redirects]]
  from   = "http://trust-lionel.com/*"
  to     = "https://trust-lionel.com/:splat"
  status = 301
  force  = true

# Redirect www to apex domain
# force = true ensures this fires even when BunnyCDN is in front
[[redirects]]
  from   = "https://www.trust-lionel.com/*"
  to     = "https://trust-lionel.com/:splat"
  status = 301
  force  = true

