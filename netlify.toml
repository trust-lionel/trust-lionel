# ── HEADERS ──────────────────────────────────────────────────
# Security and cache headers applied to all pages
[[headers]]
  for = "/*"

  [headers.values]
    # ── Clickjacking protection ───────────────────────────────
    X-Frame-Options = "SAMEORIGIN"

    # ── MIME type sniffing protection ─────────────────────────
    X-Content-Type-Options = "nosniff"

    # ── Referrer policy ──────────────────────────────────────
    Referrer-Policy = "strict-origin-when-cross-origin"

    # ── Permissions policy ───────────────────────────────────
    # Disables unused browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

    # ── Content Security Policy ───────────────────────────────
    # Allows: self, Unsplash images (images.unsplash.com and
    # plus.unsplash.com), Google Tag Manager (GTM-543DS8T7),
    # Umami Analytics (Railway), GitHub avatar CDN,
    # vercount.one (Litos view counter), Spotify embed player
    # (open.spotify.com), Spotify album art CDN (i.scdn.co).
    # Tighten img-src once post covers are migrated to /public/.
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://www.googletagmanager.com https://umami-production-f3f3.up.railway.app https://events.vercount.one;
      style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
      img-src 'self' data: https://images.unsplash.com https://plus.unsplash.com https://avatars.githubusercontent.com https://www.google.com https://github.githubassets.com https://www.googletagmanager.com https://i.scdn.co;
      connect-src 'self' https://umami-production-f3f3.up.railway.app https://api.github.com https://github-contributions-api.jogruber.de https://www.google-analytics.com https://www.google.com https://open.spotify.com;
      font-src 'self' https://cdn.jsdelivr.net;
      frame-src https://open.spotify.com;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    """

    # ── HTTP Strict Transport Security (HSTS) ────────────────
    # Instructs browsers to always use HTTPS for this domain.
    # max-age: 1 year (31,536,000 seconds)
    # preload: eligible for browser HSTS preload lists
    # includeSubDomains: covers www.trust-lionel.com
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ── Static asset caching ─────────────────────────────────────
# Astro hashes filenames on build — safe to cache indefinitely
[[headers]]
  for = "/_astro/*"

  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Font caching ─────────────────────────────────────────────
[[headers]]
  for = "/fonts/*"

  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── HTML pages — always serve fresh ──────────────────────────
[[headers]]
  for = "/*.html"

  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Sitemap — always serve fresh ─────────────────────────────
# Ensures GSC and search engine crawlers always receive the
# current sitemap. Sitemap is at /sitemap-index.xml (auto-
# generated by Astro) with pages listed in /sitemap-0.xml.
[[headers]]
  for = "/sitemap*.xml"

  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── robots.txt — always serve fresh ──────────────────────────
[[headers]]
  for = "/robots.txt"

  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── ENVIRONMENT VARIABLES ────────────────────────────────────
# Do NOT store secrets in this file.
# Set the following in Netlify UI →
# Site Configuration → Environment Variables:
#
#   PUBLIC_GITHUB_CLIENT_ID      — Gitalk OAuth App Client ID
#   PUBLIC_GITHUB_CLIENT_SECRET  — Gitalk OAuth App Client Secret
#
# These are only needed if the Gitalk comment system is enabled.
# COMMENT_CONFIG.enabled is currently set to false in
# src/config.ts — no action required unless comments are enabled.

# ── DEPLOYMENT NOTES ─────────────────────────────────────────
# 1. Sitemap
#    Astro generates /sitemap-index.xml automatically when
#    SITE.website = 'https://trust-lionel.com/' in src/config.ts.
#    Current sitemap confirmed at:
#    https://trust-lionel.com/sitemap-0.xml (July 3, 2026)
#    Canonical URL format uses trailing slashes on all pages.
#
# 2. GSC Domain property
#    trust-lionel.com is verified as a Domain property in GSC,
#    covering all subdomains (www, m.) and both http/https.
#    Use the Domain property — not the URL prefix property
#    https://trust-lionel.com/ — for all GSC analysis.
#    Existing DNS TXT verification is active and sufficient.
#    No HTTP header verification required.
#
# 3. Post-deployment GSC actions
#    After deploying this file, request indexing in GSC for
#    these URLs in priority order (URL Inspection tool):
#      1. https://trust-lionel.com/posts/macsystools/
#      2. https://trust-lionel.com/posts/three-questions/
#      3. https://trust-lionel.com/posts/vibe-coding/
#      4. https://trust-lionel.com/posts/microsoft-notification-abuse/
#      5. https://trust-lionel.com/posts/cloud-migration/
#      6. https://trust-lionel.com/posts/connectivity-uptime/
#
# 4. Image hosting
#    Current post cover images are served from Unsplash CDN
#    (images.unsplash.com and plus.unsplash.com).
#    Once covers are migrated to /public/ (local hosting),
#    remove both Unsplash domains from img-src in the
#    Content-Security-Policy above and tighten the policy.
#
# 5. vercount.one
#    Included in script-src for the Litos view counter.
#    Remove from script-src if the view counter is disabled.
#
# 6. BunnyCDN
#    trust-lionel.com pull zone has Force SSL enabled on both
#    trust-lionel.com and www.trust-lionel.com hostnames.
#    The lionelmosley.com pull zone requires a BunnyCDN Edge
#    Rule to redirect to trust-lionel.com once SSL is resolved
#    at the GoDaddy DNS level.
#
# 7. Redirect history
#    SquareSpace blog URL slug confirmed as /blog (July 3, 2026)
#    Jekyll site also used /blog/ paths.
#    Both are covered by the redirect rules above.
#    The /blog/* catch-all handles any unlisted legacy slugs.
#
# 8. Spotify embeds
#    Spotify playlist embeds are supported via the SpotifyEmbed
#    component at src/components/posts/SpotifyEmbed.astro.
#    To add a playlist to a post, add spotifyPlaylistId to the
#    post frontmatter:
#      spotifyPlaylistId: "37i9dQZF1EIgxoKbMD2OOc"
#    The playlist ID is the alphanumeric string from the
#    Spotify share link:
#      https://open.spotify.com/playlist/{spotifyPlaylistId}
#    CSP has been updated to allow open.spotify.com (frame-src,
#    connect-src) and i.scdn.co (img-src for album art).
